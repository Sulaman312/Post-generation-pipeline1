name: CI



on:

  push:

    branches: [main, master]

  pull_request:



jobs:

  backend-tests:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      - name: Install dependencies

        run: pip install -r requirements.txt ruff

      - name: Ruff lint

        run: ruff check backend tests main.py

      - name: Run unit tests

        run: python -m unittest discover -s tests -p "test_*.py" -q



  frontend:

    runs-on: ubuntu-latest

    defaults:

      run:

        working-directory: atlas-ui

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

        with:

          node-version: "20"

          cache: npm

          cache-dependency-path: atlas-ui/package-lock.json

      - name: Install dependencies

        run: npm ci

      - name: Unit tests

        run: npm run test:ci

      - name: Build

        run: npm run build


